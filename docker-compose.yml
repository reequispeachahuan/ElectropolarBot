services:
  app:
    build: .
    command: python -m app.main --mode scheduler
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+psycopg://solarbot:${POSTGRES_PASSWORD:-solarbot}@postgres:5432/solarbot
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "app.health"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s
    logging:
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./data:/app/data

  dashboard:
    build: .
    command: streamlit run app/dashboard/streamlit_app.py --server.address=0.0.0.0
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+psycopg://solarbot:${POSTGRES_PASSWORD:-solarbot}@postgres:5432/solarbot
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    profiles:
      - dashboard
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: solarbot
      POSTGRES_USER: solarbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solarbot}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solarbot -d solarbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  backup:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: solarbot
      POSTGRES_USER: solarbot
      PGPASSWORD: ${POSTGRES_PASSWORD:-solarbot}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: 86400
      BACKUP_RETENTION_DAYS: 14
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts:ro
    command: ["/bin/sh", "/scripts/backup_postgres.sh"]
    profiles:
      - backup
    restart: unless-stopped

volumes:
  postgres_data:
